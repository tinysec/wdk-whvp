name: package

on:
  push:
    branches:
      - "**"
  pull_request:
    branches:
      - "**"

env:
  WHVP_VERSION: 0.1.0
  FLOATING_TAG: v0.1.0

jobs:
  package:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: checkout
        uses: actions/checkout@v5

      - name: verify package contents
        shell: bash
        run: |
          test -f include/WinHvCompat.h
          test -f include/WinHvPlatformDefs.h
          test -f include/WinHvPlatform.h
          test -f include/WinHvEmulation.h
          test -f lib/amd64/WinHvPlatform.lib
          test -f lib/amd64/WinHvEmulation.lib
          if find lib -name '*.def' -print -quit | grep -q .; then
            echo "::error::.def files must not be committed"
            exit 1
          fi

      - name: configure
        run: cmake -S . -B build

      - name: verify CMake targets
        shell: bash
        run: |
          mkdir smoke
          cat > smoke/CMakeLists.txt <<'EOF'
          cmake_minimum_required(VERSION 3.20)
          project(whvp_smoke LANGUAGES NONE)
          add_subdirectory("${WHVP_SOURCE_DIR}" whvp)
          foreach(target IN ITEMS whvp::whvp whvp::emu)
            if(NOT TARGET ${target})
              message(FATAL_ERROR "Missing target: ${target}")
            endif()
          endforeach()
          EOF
          cmake -S smoke -B smoke-build -DWHVP_SOURCE_DIR="${GITHUB_WORKSPACE}"

  release:
    needs: package
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: publish versioned build and floating aliases
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail

          BUILD_VERSION="${WHVP_VERSION}.${GITHUB_RUN_NUMBER}"
          BUILD_TAG="v${BUILD_VERSION}"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git tag "${BUILD_TAG}" "${GITHUB_SHA}"
          git push origin "refs/tags/${BUILD_TAG}"

          gh release create "${BUILD_TAG}" \
            --title "${BUILD_TAG}" \
            --latest \
            --generate-notes

          gh release delete "${FLOATING_TAG}" --yes || true
          git push origin ":refs/tags/${FLOATING_TAG}" || true

          git tag -f "${FLOATING_TAG}" "${GITHUB_SHA}"
          git push origin "refs/tags/${FLOATING_TAG}"

          gh release create "${FLOATING_TAG}" \
            --title "${FLOATING_TAG}" \
            --latest=false \
            --notes "Floating wdk-whvp ${WHVP_VERSION} release. Always points to the latest build (${BUILD_TAG})."
